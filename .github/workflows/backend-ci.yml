name: ScamSentry Backend CI

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # Note: Tests use SQLite and mock Redis (fakeredis), so we don't strictly need Postgres/Redis services here.
    # This keeps the CI fast and lightweight.

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Linting (Ruff)
        run: |
          ruff check app/

      - name: Run Test Suite
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379"
          API_SECRET_KEY: "test-admin-secret-key-12345"
          ENVIRONMENT: "development"
        run: |
          pytest tests/ --ignore=tests/manual -v --asyncio-mode=auto
