<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --primary: #f97316;
        --primary-hover: #ea580c;
        --bg: #030712;
        --card: rgba(17, 24, 39, 0.7);
        --text: #f9fafb;
        --muted: #9ca3af;
        --border: rgba(255, 255, 255, 0.08);
        --red: #ef4444;
        --success: #10b981;
        --warning: #f59e0b;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        box-sizing: border-box;
        overflow: hidden;
      }

      .container {
        padding: 20px;
        position: relative;
      }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }

      .logo-box {
        background-color: rgba(249, 115, 22, 0.15);
        border: 1px solid rgba(249, 115, 22, 0.3);
        padding: 6px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 12px rgba(249, 115, 22, 0.1);
      }

      .logo-icon {
        width: 16px;
        height: 16px;
        background-color: var(--primary);
        clip-path: polygon(
          50% 0%,
          100% 25%,
          100% 75%,
          50% 100%,
          0% 75%,
          0% 25%
        );
      }

      h1 {
        font-size: 14px;
        font-weight: 700;
        margin: 0;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .status-card {
        background: linear-gradient(
          135deg,
          rgba(17, 24, 39, 0.6) 0%,
          rgba(3, 7, 18, 0.8) 100%
        );
        border: 1px solid var(--border);
        padding: 16px;
        border-radius: 16px;
        margin-bottom: 16px;
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
      }

      .status-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .status-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .risk-badge {
        font-size: 9px;
        padding: 2.5px 10px;
        border-radius: 9999px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .risk-badge.checking {
        background: rgba(156, 163, 175, 0.1);
        color: var(--muted);
        border: 1px solid rgba(156, 163, 175, 0.25);
      }

      .risk-badge.safe {
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.25);
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.05);
      }

      .risk-badge.malicious {
        background: rgba(239, 68, 68, 0.1);
        color: var(--red);
        border: 1px solid rgba(239, 68, 68, 0.25);
        box-shadow: 0 0 10px rgba(239, 68, 68, 0.05);
      }

      .risk-badge.suspicious {
        background: rgba(245, 158, 11, 0.1);
        color: var(--warning);
        border: 1px solid rgba(245, 158, 11, 0.25);
        box-shadow: 0 0 10px rgba(245, 158, 11, 0.05);
      }

      .risk-badge.error {
        background: rgba(239, 68, 68, 0.1);
        color: var(--red);
        border: 1px solid rgba(239, 68, 68, 0.25);
      }

      .url-display {
        font-size: 12px;
        word-break: break-all;
        color: var(--text);
        line-height: 1.4;
        margin-bottom: 12px;
        font-weight: 500;
        font-family:
          SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      }

      .score-bar-container {
        height: 6px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 9999px;
        overflow: hidden;
        margin: 12px 0 8px 0;
        border: 1px solid rgba(255, 255, 255, 0.02);
      }

      .score-bar {
        height: 100%;
        background: var(--primary);
        width: 0%;
        transition:
          width 0.8s cubic-bezier(0.16, 1, 0.3, 1),
          background-color 0.4s ease;
        border-radius: 9999px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 16px;
      }

      .stat-box {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border);
        padding: 12px;
        border-radius: 12px;
        transition: all 0.2s ease;
      }

      .stat-box:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(249, 115, 22, 0.15);
      }

      .stat-val {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        display: block;
        margin-bottom: 2px;
      }

      .stat-lbl {
        font-size: 9px;
        color: var(--muted);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      footer {
        margin-top: 20px;
      }

      .action-btn {
        width: 100%;
        background: linear-gradient(
          90deg,
          var(--primary) 0%,
          var(--primary-hover) 100%
        );
        color: #ffffff;
        border: none;
        padding: 11px;
        border-radius: 12px;
        font-size: 11.5px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.15);
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .action-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(249, 115, 22, 0.25);
        filter: brightness(1.05);
      }

      .action-btn:active {
        transform: translateY(0);
      }

      #loading {
        text-align: center;
        font-size: 11px;
        color: var(--muted);
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(249, 115, 22, 0.15);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      #error-message {
        display: none;
        font-size: 10.5px;
        color: var(--red);
        background: rgba(239, 68, 68, 0.06);
        border: 1px solid rgba(239, 68, 68, 0.2);
        padding: 10px 14px;
        border-radius: 12px;
        margin-top: 14px;
        font-weight: 500;
        line-height: 1.4;
        text-align: center;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo-box">
          <div class="logo-icon"></div>
        </div>
        <h1>ScamSentry Shield</h1>
      </header>

      <div id="loading">
        <div class="spinner"></div>
        <span>Initializing forensic checks...</span>
      </div>

      <div id="main-ui" style="display: none">
        <div class="status-card">
          <div class="status-header">
            <span class="status-label">Page Reputation</span>
            <span id="risk-badge" class="risk-badge checking">Checking</span>
          </div>
          <div id="current-url" class="url-display">URL</div>
          <div class="score-bar-container">
            <div id="score-bar" class="score-bar"></div>
          </div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 9px;
              color: var(--muted);
              font-weight: 600;
              text-transform: uppercase;
              letter-spacing: 0.05em;
            "
          >
            <span>Trust Score</span>
            <span id="score-val" style="color: var(--muted); font-weight: bold"
              >--%</span
            >
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <span class="stat-val" id="links-scanned">0</span>
            <span class="stat-lbl">Links Scanned</span>
          </div>
          <div class="stat-box">
            <span
              class="stat-val"
              id="threats-blocked"
              style="color: var(--red)"
              >0</span
            >
            <span class="stat-lbl">Threats Blocked</span>
          </div>
        </div>

        <!-- Forensic Indicators Drawer -->
        <div
          id="indicators-card"
          style="
            display: none;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            margin-top: 16px;
          "
        >
          <span
            style="
              font-size: 9px;
              font-weight: 700;
              color: var(--muted);
              text-transform: uppercase;
              letter-spacing: 0.05em;
              display: block;
              margin-bottom: 8px;
            "
            >Active Threat Flags</span
          >
          <ul
            id="indicators-list"
            style="
              margin: 0;
              padding-left: 16px;
              font-size: 11px;
              color: var(--text);
              opacity: 0.85;
              line-height: 1.5;
              text-align: left;
            "
          >
            <!-- Injected dynamically -->
          </ul>
        </div>

        <div id="error-message"></div>

        <footer>
          <button class="action-btn" id="view-dashboard">
            Open Forensic Dashboard
          </button>
        </footer>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
