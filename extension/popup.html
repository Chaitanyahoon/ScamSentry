<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #f97316;
      --bg: #09090b;
      --card: #121214;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --border: #27272a;
      --red: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      border: 1px solid var(--border);
    }

    .container {
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo-box {
      background-color: rgba(249, 115, 22, 0.1);
      border: 1px solid rgba(249, 115, 22, 0.3);
      padding: 6px;
      border-radius: 8px;
    }

    .logo-icon {
      width: 16px;
      height: 16px;
      background-color: var(--primary);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      margin: 0;
      color: var(--text);
    }

    .status-card {
      background-color: var(--card);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .status-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .status-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
    }

    .risk-badge {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 9999px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .risk-badge.safe {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    
    .risk-badge.malicious {
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .risk-badge.suspicious {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .url-display {
      font-size: 12px;
      word-break: break-all;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .score-bar-container {
      height: 6px;
      background: var(--border);
      border-radius: 9999px;
      overflow: hidden;
      margin: 12px 0;
    }

    .score-bar {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 1s ease-out;
      border-radius: 9999px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 10px;
    }

    .stat-val {
      font-size: 16px;
      font-weight: bold;
      color: var(--text);
      display: block;
    }

    .stat-lbl {
      font-size: 9px;
      color: var(--muted);
      font-weight: 500;
    }

    footer {
      margin-top: 20px;
    }

    .action-btn {
      width: 100%;
      background: var(--primary);
      color: #ffffff;
      border: none;
      padding: 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      filter: brightness(1.1);
    }
    
    #loading {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-box">
        <div class="logo-icon"></div>
      </div>
      <h1>ScamSentry Shield</h1>
    </header>

    <div id="loading">Scanning page status...</div>

    <div id="main-ui" style="display: none;">
      <div class="status-card">
        <div class="status-header">
          <span class="status-label">Page Reputation</span>
          <span id="risk-badge" class="risk-badge safe">Safe</span>
        </div>
        <div id="current-url" class="url-display">https://google.com</div>
        <div class="score-bar-container">
          <div id="score-bar" class="score-bar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); font-weight: 500;">
          <span>Trust Score</span>
          <span id="score-val" style="color: var(--primary); font-weight: bold;">0%</span>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <span class="stat-val" id="links-scanned">0</span>
          <span class="stat-lbl">Links Scanned</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="threats-blocked" style="color: var(--red);">0</span>
          <span class="stat-lbl">Threats Blocked</span>
        </div>
      </div>

      <footer>
        <button class="action-btn" id="view-dashboard">
          Open Forensic Dashboard
        </button>
      </footer>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
